name: Windows Package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        shell: pwsh
    env:
      BUILD_DIR: build
      CONFIGURATION: Release
      TRUSTED_SIGNING_ENDPOINT: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
      TRUSTED_SIGNING_ACCOUNT_NAME: ${{ vars.TRUSTED_SIGNING_ACCOUNT_NAME }}
      TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure CMake
        run: cmake -S . -B $env:BUILD_DIR -A x64

      - name: Build
        run: cmake --build $env:BUILD_DIR --config $env:CONFIGURATION --parallel

      - name: Run Smoke Tests
        run: .\tests\run-smoke-tests.ps1 -BuildDir $env:BUILD_DIR -Configuration $env:CONFIGURATION

      - name: Select Package Version
        id: vars
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          } else {
            $version = "sha-${{ github.sha }}"
          }
          "package_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve Standalone Executables
        id: exes
        run: |
          $loopcodeCandidates = @(
            (Join-Path (Join-Path $env:BUILD_DIR $env:CONFIGURATION) "loopcode.exe"),
            (Join-Path $env:BUILD_DIR "loopcode.exe")
          )
          $loopguardCandidates = @(
            (Join-Path (Join-Path $env:BUILD_DIR $env:CONFIGURATION) "loopguard.exe"),
            (Join-Path $env:BUILD_DIR "loopguard.exe")
          )

          $loopcodeExe = $loopcodeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          $loopguardExe = $loopguardCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $loopcodeExe) {
            throw "loopcode.exe not found. Checked: $($loopcodeCandidates -join ', ')"
          }
          if (-not $loopguardExe) {
            throw "loopguard.exe not found. Checked: $($loopguardCandidates -join ', ')"
          }

          $loopcodeExe = (Resolve-Path $loopcodeExe).Path
          $loopguardExe = (Resolve-Path $loopguardExe).Path

          "loopcode_exe=$loopcodeExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "loopguard_exe=$loopguardExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve Trusted Signing Settings
        id: signing
        run: |
          $required = [ordered]@{
            AZURE_TENANT_ID = $env:AZURE_TENANT_ID
            AZURE_CLIENT_ID = $env:AZURE_CLIENT_ID
            TRUSTED_SIGNING_ENDPOINT = $env:TRUSTED_SIGNING_ENDPOINT
            TRUSTED_SIGNING_ACCOUNT_NAME = $env:TRUSTED_SIGNING_ACCOUNT_NAME
            TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME = $env:TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME
          }

          $missing = @(
            $required.GetEnumerator() |
              Where-Object { [string]::IsNullOrWhiteSpace([string]$_.Value) } |
              ForEach-Object { $_.Key }
          )

          $configured = $missing.Count -eq 0
          $configuredText = $configured.ToString().ToLowerInvariant()
          $missingText = $missing -join ", "

          "configured=$configuredText" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "missing=$missingText" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          if ($configured) {
            Write-Host "Trusted Signing is configured for this run."
          } else {
            Write-Warning "Trusted Signing is not configured. Missing: $missingText"
          }

      - name: Require signing for tagged releases
        if: startsWith(github.ref, 'refs/tags/') && steps.signing.outputs.configured != 'true'
        run: |
          throw "Tagged releases require Trusted Signing configuration. Missing: ${{ steps.signing.outputs.missing }}"

      - name: Azure Login For Trusted Signing
        if: github.event_name != 'pull_request' && steps.signing.outputs.configured == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Sign Windows Executables
        if: github.event_name != 'pull_request' && steps.signing.outputs.configured == 'true'
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files: |
            ${{ steps.exes.outputs.loopcode_exe }}
            ${{ steps.exes.outputs.loopguard_exe }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Verify Signed Executables
        if: github.event_name != 'pull_request' && steps.signing.outputs.configured == 'true'
        run: |
          $paths = @(
            "${{ steps.exes.outputs.loopcode_exe }}",
            "${{ steps.exes.outputs.loopguard_exe }}"
          )

          foreach ($path in $paths) {
            $signature = Get-AuthenticodeSignature -FilePath $path
            Write-Host "$path => $($signature.Status)"
            if ($signature.Status -ne "Valid") {
              throw "Authenticode verification failed for $path: $($signature.Status) $($signature.StatusMessage)"
            }
          }

      - name: Package
        id: package
        run: .\scripts\package.ps1 -BuildDir $env:BUILD_DIR -Configuration $env:CONFIGURATION -Version "${{ steps.vars.outputs.package_version }}" -OutputDir dist

      - name: Upload Standalone Executables
        uses: actions/upload-artifact@v4
        with:
          name: loopcode-${{ steps.vars.outputs.package_version }}-windows-x64-exe
          path: |
            ${{ steps.exes.outputs.loopcode_exe }}
            ${{ steps.exes.outputs.loopguard_exe }}
          if-no-files-found: error

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.package_name }}
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-output-${{ github.run_id }}
          path: build/test-output/**
          if-no-files-found: ignore

      - name: Publish Release Assets
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "${{ steps.package.outputs.package_zip }}"
          $sha = "${{ steps.package.outputs.package_sha256 }}"
          $loopcodeExe = "${{ steps.exes.outputs.loopcode_exe }}"
          $loopguardExe = "${{ steps.exes.outputs.loopguard_exe }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $zip $sha $loopcodeExe $loopguardExe --verify-tag --generate-notes
          } else {
            gh release upload $tag $zip $sha $loopcodeExe $loopguardExe --clobber
          }
