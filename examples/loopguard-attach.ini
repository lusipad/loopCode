[agent]
mode = attach
attach_strategy = process_tree
attach_window_scope = all
target_process_names = codex.exe||claude.exe
terminal_process_names = WindowsTerminal.exe||OpenConsole.exe||conhost.exe
attach_visible_text_contains = codex||claude||continue||继续||approval||network||timeout||thinking||working
window_title_contains =
window_class_contains =
workdir = .
restart_on_exit = false
max_restarts = 0
restart_delay_seconds = 0

[watchdog]
idle_seconds = 180
attach_poll_millis = 1500
action_cooldown_seconds = 40
initial_resume_delay_seconds = 0
transcript_keep_lines = 150
decision_timeout_seconds = 20
echo_output = true
log_dir = logs

[actions]
continue_message = 继续
resume_template = 请根据最近上下文继续刚才中断的任务。原因：{reason}\n\n最近 transcript：\n{transcript}
new_session_message = /new
new_session_resume_template = 这是一个新的会话。请根据最近上下文继续刚才中断的任务，并先说明恢复点。原因：{reason}\n\n最近 transcript：\n{transcript}

[patterns]
wait = continue||继续||press enter||waiting for your input||need your approval||confirm
recoverable_error = network||timed out||timeout||connection reset||service unavailable||temporary failure||rate limit

[recovery]
recoverable_error_new_session_threshold = 2

[decision]
mode = fixed
external_command = powershell -ExecutionPolicy Bypass -File scripts\decider-example.ps1 -ContextFile "{context_file}" -Reason "{reason}"

[session]
enabled = true
name =
storage_dir = sessions
